<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Economics Retrieval Room</title>
<style>
:root{
  --ink:#16201c; --paper:#f2efe6; --card:#fbfaf5; --line:#d8d1c1;
  --teal:#0f5c4d; --teal-dk:#0a3d33; --plum:#5b3a64; --plum-dk:#41294a;
  --amber:#c97b2c; --rose:#a8443a;
  --good:#2f7d5b; --mid:#c97b2c; --weak:#a8443a;
  --shadow:0 1px 0 #fff inset, 0 2px 8px rgba(22,32,28,.06);
  --accent:var(--teal); --accent-dk:var(--teal-dk);
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  -webkit-font-smoothing:antialiased;line-height:1.5}
.wrap{max-width:940px;margin:0 auto;padding:24px 18px 90px}
.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
h1,h2,h3{font-weight:600;letter-spacing:-.01em;margin:0}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit;font-size:16px}
.eyebrow{font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--accent)}
.mast{display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:24px;flex-wrap:wrap}
.mast h1{font-size:29px}
.mast .sub{color:#5c6b63;font-size:14px}
.tabs{display:flex;gap:4px}
.tab{background:transparent;padding:7px 14px;border-radius:999px;font-size:13px;
  color:var(--ink);border:1px solid transparent}
.tab.on{background:var(--ink);color:#fbfaf5}
.tab:not(.on):hover{background:#e6e0d2}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
.hero{position:relative;overflow:hidden}
.hero .big{font-size:90px;line-height:.8;font-weight:600;color:#ece6d8;
  position:absolute;right:-4px;bottom:-16px;pointer-events:none;letter-spacing:-.04em}
label{display:block;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
  color:#5c6b63;margin:0 0 5px}
.field{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;
  background:#fff;margin-bottom:14px}
.field:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
textarea.field{min-height:120px;resize:vertical;line-height:1.5}
.btn{background:var(--accent);color:#fff;padding:13px 22px;border-radius:10px;
  font-size:15px;font-weight:500}
.btn:hover{background:var(--accent-dk)}
.btn.block{width:100%}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{background:#ece6d8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.qcard{margin-bottom:16px}
.qnum{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--amber);letter-spacing:.1em}
.twotag{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--plum);
  background:#efe7f1;border:1px solid #ddcce1;border-radius:6px;padding:2px 8px;margin-left:8px}
.qtext{font-size:19px;margin:6px 0 16px;line-height:1.35}
.qimg{display:block;max-width:100%;height:auto;margin:0 0 16px;border:1px solid var(--line);border-radius:8px;background:#fff}
.trend{font-size:12px;font-weight:600;margin-left:4px}.trend.up{color:var(--good)}.trend.down{color:var(--rose)}.trend.steady{color:var(--mid,#b8860b)}.trend.new{color:var(--muted,#888)}
.opt{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;
  background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;
  margin-bottom:9px;font-size:16px;transition:.12s}
.opt:hover{border-color:var(--accent)}
.opt.sel{border-color:var(--accent);background:#eef5f1}
.opt .ltr{font-family:ui-monospace,Menlo,monospace;font-weight:600;color:var(--accent);
  border:1.5px solid currentColor;border-radius:6px;min-width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;font-size:13px;flex:none}
.opt.sel .ltr{background:var(--accent);color:#fff;border-color:var(--accent)}
.opt.correct{border-color:var(--good);background:#eaf4ee}
.opt.correct .ltr{background:var(--good);color:#fff;border-color:var(--good)}
.opt.wrong{border-color:var(--rose);background:#f7ebe9}
.opt.wrong .ltr{background:var(--rose);color:#fff;border-color:var(--rose)}
.opt.miss{border-color:var(--good);border-style:dashed;background:#f4faf6}
.opt:disabled{cursor:default}
.bar{height:8px;background:#e7e1d3;border-radius:99px;overflow:hidden}
.bar > i{display:block;height:100%;border-radius:99px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:3px 10px;
  border-radius:99px;font-family:ui-monospace,Menlo,monospace;white-space:nowrap}
.pill.good{background:#eaf4ee;color:var(--good)}
.pill.mid{background:#faf0e3;color:var(--mid)}
.pill.weak{background:#f7ebe9;color:var(--weak)}
.pill.late{background:#faf0e3;color:var(--amber)}
.pill.miss{background:#efe9dd;color:#7a857e}
.pill.done{background:#eaf4ee;color:var(--good)}
.pill.bs{background:#efe7f1;color:var(--plum)}
.pill.ec{background:#e4efe9;color:var(--teal)}
.pill.al{background:#ede7f4;color:#5b3a64}
.subjbadge.pill.al{border:1px solid #d8c9e4}
.grid{display:grid;gap:12px}
@media(min-width:600px){.grid.two{grid-template-columns:1fr 1fr}}
.trow{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--line)}
.trow:last-child{border-bottom:none}
.tname{font-size:15px}
.muted{color:#7a857e;font-size:13px}
.revisit{border-left:3px solid var(--amber);padding-left:14px}
.empty{text-align:center;color:#7a857e;padding:34px 10px;font-size:15px}
.kpi{font-size:34px;font-weight:600;letter-spacing:-.02em;line-height:1}
.kpi-lbl{font-size:12px;color:#5c6b63;text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
select.field{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%2316201c' stroke-width='1.6' fill='none'/></svg>");
  background-repeat:no-repeat;background-position:right 14px center}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  background:var(--ink);color:#fbfaf5;padding:11px 18px;border-radius:10px;font-size:14px;
  box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:50;max-width:90%}
.flex{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spacer{flex:1}
hr.rule{border:none;border-top:1px solid var(--line);margin:18px 0}
.due{display:inline-flex;align-items:center;gap:7px;background:#faf0e3;color:var(--amber);
  border:1px solid #ecd9bd;border-radius:8px;padding:6px 11px;font-size:13px;font-family:ui-monospace,Menlo,monospace}
.due.over{background:#f7ebe9;color:var(--rose);border-color:#e6c4bf}
.subtab{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.subtab button{background:#ece6d8;color:var(--ink);padding:8px 15px;border-radius:8px;font-size:13px}
.subtab button.on{background:var(--ink);color:#fbfaf5}
.seg{display:flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin:14px 0}
.seg div{flex:1;text-align:center;padding:10px 6px;font-family:ui-monospace,Menlo,monospace;font-size:12px}
.seg div b{display:block;font-size:22px;font-family:inherit}
.seg div+div{border-left:1px solid var(--line)}
.subjbadge{display:inline-block;font-family:ui-monospace,Menlo,monospace;font-size:11px;
  padding:3px 9px;border-radius:6px;letter-spacing:.05em}
</style>

<script>
const Store = {
  _ready:false, _mem:{},
  async _init(){
    if(this._ready)return;
    try{
      if(window.firebase && window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.projectId && !String(window.FIREBASE_CONFIG.projectId).includes('YOUR_')){
        if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);
        this.db=firebase.firestore();
        this.col=this.db.collection('data');
        // Anonymous sign-in so only visitors to this site can access the database
        try{
          await firebase.auth().signInAnonymously();
          await new Promise((res)=>{const u=firebase.auth().onAuthStateChanged(x=>{if(x){u();res();}});});
        }catch(authErr){console.warn('Anon auth failed',authErr);}
        this._ready=true;this._online=true;
        return;
      }
    }catch(e){console.warn('Firebase init failed, using local storage',e);}
    this._ready=true;this._online=false; // fallback to localStorage
  },
  _lk(k){return k.replace(/[\/]/g,'__');}, // firestore-safe doc id
  async get(k){
    await this._init();
    if(this._online){
      try{const d=await this.col.doc(this._lk(k)).get();return d.exists?(d.data().v??null):null;}
      catch(e){console.warn('get failed',e);return null;}
    }
    try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}
  },
  async set(k,v){
    await this._init();
    if(this._online){
      try{await this.col.doc(this._lk(k)).set({k,v});return true;}
      catch(e){console.warn('set failed',e);return false;}
    }
    try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){return false;}
  },
  async del(k){
    await this._init();
    if(this._online){try{await this.col.doc(this._lk(k)).delete();}catch(e){console.warn('del failed',e);}return;}
    try{localStorage.removeItem(k);}catch(e){}
  },
  async list(p){
    await this._init();
    if(this._online){
      try{
        // Firestore range query on the stored key field
        const end=p+'\uf8ff';
        const snap=await this.col.where('k','>=',p).where('k','<=',end).get();
        return snap.docs.map(d=>d.data().k).filter(k=>k&&k.startsWith(p));
      }catch(e){console.warn('list failed',e);return [];}
    }
    try{const out=[];for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(key&&key.startsWith(p))out.push(key);}return out;}catch(e){return [];}
  }
}
const BANK=window.QUESTION_BANK;
const SPECS={Economics:{label:'Economics',short:'Ec',token:'ec'},Business:{label:'Business',short:'Bs',token:'bs'},'A-Level Economics':{label:'A-Level Economics',short:'Ec',token:'ec'},'A-Level Business':{label:'A-Level Business',short:'Bs',token:'bs'}};
const IMG_BASE='https://raw.githubusercontent.com/YOURUSER/econ-images/main/';
const TOPICS=(()=>{const m={};BANK.forEach(q=>{const k=q.spec+'|'+q.code;(m[k]=m[k]||{spec:q.spec,code:q.code,topic:q.topic,paper:q.paper,n:0}).n++;});
  return Object.values(m).sort((a,b)=>a.code.localeCompare(b.code,undefined,{numeric:true}));})();
function topicsForSpec(s){return TOPICS.filter(t=>t.spec===s);}
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
const slug=s=>String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
function toast(t){const x=el('div','toast',esc(t));document.body.appendChild(x);setTimeout(()=>x.remove(),2400);}
function fmtDue(ts){if(!ts)return '';const d=new Date(ts);
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})+', '+
    d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}

/* subject detection from class code: Bs / Ec after a slash, case-insensitive */
function yearOf(code){const m=String(code||'').match(/(\d{1,2})/);return m?parseInt(m[1],10):null;}
function specOf(code){
  if(!code)return null;
  const seg=code.includes('/')?code.split('/').pop():code;
  const s=seg.toLowerCase();
  const yr=yearOf(code);
  const aLevel=(yr===12||yr===13);
  if(/bs/.test(s))return aLevel?'A-Level Business':'Business';
  if(/ec/.test(s))return aLevel?'A-Level Economics':'Economics';
  return null;

function startQuiz(spec,code,assign){
  setAccent(spec);
  const qs=BANK.filter(q=>q.spec===spec&&q.code===code);
  const meta=topicsForSpec(spec).find(t=>t.code===code);
  const answers=qs.map(()=>[]);
  const app=shell();
  const head=el('div','card');
  head.innerHTML=`<div class="eyebrow">${esc(spec)} · ${meta.paper} · ${code}</div>
    <h2 style="font-size:22px;margin:6px 0 10px">${esc(meta.topic)}</h2>
    <div class="bar"><i id="pbar" style="width:0;background:var(--accent)"></i></div>
    <div class="muted mono" style="margin-top:6px"><span id="pcount">0</span>/${qs.length} answered</div>`;
  app.appendChild(head);
  function refresh(){const done=answers.filter((a,i)=>qs[i].multi?a.length===2:a.length===1).length;
    $('#pcount').textContent=done;$('#pbar').style.width=(done/qs.length*100)+'%';
    $('#submitBtn').disabled=done<qs.length;}
  qs.forEach((q,i)=>{
    const c=el('div','card qcard');
    c.innerHTML=`<div class="qnum">Q${i+1}${q.multi?'<span class="twotag">PICK TWO</span>':''}</div><div class="qtext">${esc(q.q)}</div>`+(q.img?`<img class="qimg" src="${IMG_BASE}${q.img}" alt="diagram for question ${i+1}" loading="lazy">`:'');
    Object.keys(q.o).forEach(L=>{
      const o=el('button','opt',`<span class="ltr">${L}</span><span>${esc(q.o[L])}</span>`);
      o.onclick=()=>{const arr=answers[i];const idx=arr.indexOf(L);
        if(q.multi){
          if(idx>=0)arr.splice(idx,1);
          else{if(arr.length>=2){toast('Pick exactly two — deselect one first');return;}arr.push(L);}
        }else{answers[i]=arr[0]===L?[]:[L];}
        [...c.querySelectorAll('.opt')].forEach(x=>x.classList.remove('sel'));
        answers[i].forEach(sel=>{[...c.querySelectorAll('.opt')].forEach(x=>{if(x.querySelector('.ltr').textContent===sel)x.classList.add('sel');});});
        refresh();};
      c.appendChild(o);});
    app.appendChild(c);});
  const foot=el('div','card');
  const sb=el('button','btn block','Submit answers');sb.id='submitBtn';sb.disabled=true;
  sb.onclick=()=>gradeQuiz(spec,code,qs,answers,assign);foot.appendChild(sb);
  const back=el('button','btn ghost block','← Back without submitting');back.style.marginTop='10px';
  back.onclick=()=>render();foot.appendChild(back);app.appendChild(foot);window.scrollTo(0,0);
}

async function gradeQuiz(spec,code,qs,answers,assign){
  let score=0;
  qs.forEach((q,i)=>{const got=[...answers[i]].sort().join(',');const want=[...q.a].sort().join(',');if(got===want)score++;});
  [...document.querySelectorAll('.qcard')].forEach((c,i)=>{const q=qs[i];const chosen=answers[i];
    [...c.querySelectorAll('.opt')].forEach(o=>{const L=o.querySelector('.ltr').textContent;o.disabled=true;o.classList.remove('sel');
      const isCorrect=q.a.includes(L),isChosen=chosen.includes(L);
      if(isCorrect&&isChosen)o.classList.add('correct');
      else if(isChosen&&!isCorrect)o.classList.add('wrong');
      else if(isCorrect&&!isChosen)o.classList.add('miss');});});
  const meta=topicsForSpec(spec).find(t=>t.code===code);const ts=Date.now();
  const late=!!(assign&&assign.due&&ts>assign.due);
  await Store.set(`attempt:${ck(SESSION.cls)}:${slug(SESSION.name)}:${ts}`,{
    name:SESSION.name,cls:SESSION.cls,spec,code,topic:meta.topic,paper:meta.paper,
    score,total:qs.length,ts,late,assignTs:assign?assign.ts:null});
  const app=$('#app');const r=el('div','card');const pct=Math.round(score/qs.length*100);
  const band=pct>=80?'good':pct>=50?'mid':'weak';
  r.innerHTML=`<div class="eyebrow">Result saved${late?' · late':''}</div>
    <div class="flex" style="margin-top:8px"><div><div class="kpi">${score}/${qs.length}</div>
      <div class="kpi-lbl">${esc(meta.topic)}</div></div><div class="spacer"></div>
      <span class="pill ${band}">${pct}%</span>${late?'<span class="pill late">Late</span>':''}</div>
    <hr class="rule"><div class="muted">${pct>=80?'Strong — this topic looks secure.':pct>=50?'Getting there — worth a revisit soon.':'Flagged as a weak spot. Your teacher will see this for next steps.'}
    ${qs.some(q=>q.multi)?' Dashed outlines show a correct answer you did not pick.':''}</div>`;
  const again=el('button','btn block','Back to my tasks');again.style.marginTop='16px';
  again.onclick=()=>render();r.appendChild(again);app.insertBefore(r,app.children[1]);
  window.scrollTo(0,0);toast('Score recorded'+(late?' (late)':''));
}

// Parse pasted "week -> date" lines like "1 2025-09-01" or "1: 1 Sept" (Monday dates)
function parseCalendarText(txt){
  const map={};
  txt.split(/\n/).forEach(line=>{
    const m=line.match(/^\s*(\d{1,2})\s*[:\-\t ]+\s*(.+?)\s*$/);
    if(!m)return;
    const wk=parseInt(m[1],10); if(wk<1||wk>TT_WEEKS)return;
    const d=new Date(m[2]);
    if(!isNaN(d.getTime()))map[wk]=d.toISOString().slice(0,10);
  });
  return map;
}
// Which school week is "today" (or a given date)? Returns week number 1..35 or null.
function weekForDate(cal,when){
  const entries=Object.entries(cal).map(([w,d])=>[parseInt(w,10),new Date(d+'T00:00:00')]).sort((a,b)=>a[1]-b[1]);
  if(!entries.length)return null;
  const now=when?new Date(when):new Date();now.setHours(0,0,0,0);
  let wk=null;
  for(const [w,d] of entries){ if(now>=d) wk=w; else break; }
  return wk; // last week whose Monday has passed
}
function blockForWeek(wk){ return wk?Math.ceil(wk/2):null; } // week1-2=block1, 3-4=block2...
async function activeBlock(spec,when){
  const cal=await getCalendar(); const wk=weekForDate(cal,when);
  if(!wk)return null;

}

const TT_DATA_PREFIXES=['roster:','assign:','attempt:','tt:'];
async function exportData(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&TT_DATA_PREFIXES.some(p=>k.startsWith(p))){data[k]=localStorage.getItem(k);}
  }
  const payload={_type:'retrieval-room-data',_version:1,_exported:new Date().toISOString(),data};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='retrieval-room-data_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  return Object.keys(data).length;
}
async function importData(text,mode){
  let payload;
  try{payload=JSON.parse(text);}catch(e){throw new Error('That file is not valid data.');}
  if(!payload||payload._type!=='retrieval-room-data'||!payload.data)throw new Error('That file is not a Retrieval Room data export.');
  const keys=Object.keys(payload.data);
  if(mode==='replace'){
    // remove existing data keys first
    const del=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&TT_DATA_PREFIXES.some(p=>k.startsWith(p)))del.push(k);}
    del.forEach(k=>localStorage.removeItem(k));
  }
  keys.forEach(k=>{localStorage.setItem(k,payload.data[k]);});
  return {keys:keys.length,when:payload._exported};
}
function countDataKeys(){let n=0;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&TT_DATA_PREFIXES.some(p=>k.startsWith(p)))n++;}return n;}

      <div class="spacer"></div><span class="pill weak">${t.pct}%</span></div>
      <div class="muted" style="font-size:13px">${t.attempts} attempt(s)</div>`;
    const a=el('button','btn ghost','Re-assign to '+cls);a.style.cssText='font-size:13px;margin-top:8px;padding:7px 14px';
    a.onclick=async()=>{await Store.set('assign:'+ck(cls),{cls,spec:specOf(cls),code:t.code,topic:t.topic,due:null,ts:Date.now()});toast('Re-assigned '+t.topic);render();};
    row.appendChild(a);rc.appendChild(row);});
  app.appendChild(rc);
  const hc=el('div','card');
  hc.innerHTML=`<div class="eyebrow">Class picture</div><h3 style="font-size:18px;margin:6px 0 14px">Performance by topic</h3>`;
  tStats.sort((a,b)=>a.code.localeCompare(b.code,undefined,{numeric:true})).forEach(t=>hc.appendChild(topicRow(t)));
  app.appendChild(hc);
  const sc=el('div','card');
  sc.innerHTML=`<div class="eyebrow">Individuals</div><h3 style="font-size:18px;margin:6px 0 14px">Students in ${esc(cls)}</h3>`;
  const byStu={};classAtt.forEach(a=>{(byStu[a.name]=byStu[a.name]||[]).push(a);});
  Object.entries(byStu).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([nm,arr])=>{
    const pct=Math.round(arr.reduce((s,a)=>s+a.score/a.total,0)/arr.length*100);
    const band=pct>=80?'good':pct>=50?'mid':'weak';
    const ts2=topicStats(arr).sort((a,b)=>a.pct-b.pct);const weakest=ts2[0];
    const lateN=arr.filter(a=>a.late).length;const row=el('div','trow');
    row.innerHTML=`<div><div class="tname">${esc(nm)}</div>
        <div class="muted">${arr.length} task(s)${weakest&&weakest.pct<60?` · weak: ${esc(weakest.topic)}`:''}${lateN?` · ${lateN} late`:''}</div></div>
      <div class="muted mono">${arr.length}×</div><span class="pill ${band}">${pct}%</span>`;
    sc.appendChild(row);});
  app.appendChild(sc);
}

async function migrateClass(oldC,newC){
  // Move roster, assign, and all attempt records from oldC -> newC across stores.
  const oc=ck(oldC), nc=ck(newC);
  // roster
  const r=await Store.get('roster:'+oc);
  if(r){await Store.set('roster:'+nc,{...r,cls:newC});await Store.del('roster:'+oc);}
  // assign (single record per class)
  const a=await Store.get('assign:'+oc);
  if(a){await Store.set('assign:'+nc,{...a,cls:newC});await Store.del('assign:'+oc);}
  // attempts (many; keys are attempt:<ck(cls)>:<slug(name)>:...)
  for(const k of await Store.list('attempt:'+oc+':')){
    const v=await Store.get(k);if(!v)continue;
    const nk=k.replace('attempt:'+oc+':','attempt:'+nc+':');
    await Store.set(nk,{...v,cls:newC});await Store.del(k);
  }
}
async function deleteClass(cls){
  const c=ck(cls);
  await Store.del('roster:'+c);
  await Store.del('assign:'+c);
  for(const k of await Store.list('attempt:'+c+':')) await Store.del(k);
}

async function tRoster(app){
  // ---- Data backup / transfer ----
  const dc=el('div','card');
  dc.innerHTML=`<div class="eyebrow">Data backup & transfer</div>
    <h3 style="font-size:18px;margin:6px 0 4px">Move your setup between computers</h3>
    <p class="muted" style="margin:0 0 12px">This platform stores classes, timetable and scores in <b>this</b> browser only. Export a backup file to carry everything to another computer, then import it there. <span style="color:var(--rose)">Tip: export regularly \u2014 clearing your browser data erases everything.</span></p>`;
  const dbtns=el('div');dbtns.style.cssText='display:flex;flex-wrap:wrap;gap:8px;align-items:center';
  const exb=el('button','btn','\u2b07 Export backup');
  exb.onclick=async()=>{const n=await exportData();toast('Exported '+n+' records');};
  const imb=el('button','btn ghost','\u2b06 Import backup');
  const fileIn=el('input');fileIn.type='file';fileIn.accept='.json,application/json';fileIn.style.display='none';
  imb.onclick=()=>fileIn.click();
  fileIn.onchange=async()=>{
    const f=fileIn.files[0];if(!f)return;
    const text=await f.text();fileIn.value='';
    const mode=confirm('Import data:\n\nOK = REPLACE everything in this browser with the file (recommended when moving to a new computer).\n\nCancel = MERGE the file into what\u2019s already here (keeps existing classes, adds/overwrites matching ones).')?'replace':'merge';
    try{const r=await importData(text,mode);toast('Imported '+r.keys+' records ('+mode+')');render();}
    catch(err){toast('Import failed: '+(err.message||err));}
  };
  dbtns.append(exb,imb,fileIn);
  const dstat=el('div','muted');dstat.style.marginTop='10px';dstat.textContent=countDataKeys()+' data records currently in this browser.';
  dc.append(dbtns,dstat);app.appendChild(dc);

  const ac=el('div','card');
  ac.innerHTML=`<div class="eyebrow">Start-of-year setup</div>
    <h3 style="font-size:18px;margin:6px 0 4px">Add or update a class register</h3>
    <p class="muted" style="margin:0 0 14px">Paste your class list — one student per line. The subject is read from the class code (Bs/Ec).</p>`;
  const cls=el('input','field mono');cls.placeholder='Class code e.g. 10a/Bs1';
  const hint=el('div','muted');hint.style.margin='-6px 0 14px';
  cls.oninput=()=>{const sp=specOf(cls.value.trim());hint.innerHTML=cls.value.trim()?(sp?'Subject: '+subjBadge(sp):'<span style="color:var(--rose)">Code must contain Bs or Ec</span>'):'';};
  const ta=el('textarea','field');ta.placeholder='Priya Shah\nJamal Edwards\nGrace O\u2019Connor\n…';
  ac.append(el('label',null,'Class code'),cls,hint,el('label',null,'Student names'),ta);
  const b=el('button','btn','Save register');
  b.onclick=async()=>{const c=cls.value.trim();const names=ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
    if(!c||!names.length){toast('Add a class code and at least one name');return;}
    if(!specOf(c)){toast('Class code must contain Bs or Ec');return;}
    try{
      const ok=await Store.set('roster:'+ck(c),{cls:c,names});
      if(!ok){toast('Save failed — your browser may be blocking storage (private mode?).');return;}
      toast(`Saved ${names.length} students to ${c}`);render();
    }catch(err){toast('Save error: '+(err&&err.message?err.message:err));console.error('roster save',err);}};
  ac.appendChild(b);app.appendChild(ac);
  const rKeys=await Store.list('roster:');const lc=el('div','card');
  lc.innerHTML=`<div class="eyebrow">Saved registers</div><h3 style="font-size:18px;margin:6px 0 12px">Your classes</h3>`;
  if(!rKeys.length)lc.appendChild(el('div','empty','No registers yet. Paste one above to get started.'));
  for(const k of rKeys){const v=await Store.get(k)||{};const c=v.cls||k.split(':')[1];const names=v.names||[];const row=el('div','trow');
    row.style.gridTemplateColumns='1fr auto';
    row.innerHTML=`<div><div class="tname">${esc(c)} ${subjBadge(specOf(c))}</div><div class="muted">${names.length} students</div></div><div class="rowacts"></div>`;
    const ed=el('button','btn ghost','Load');ed.style.cssText='font-size:13px;padding:7px 14px';
    ed.onclick=()=>{cls.value=c;cls.dispatchEvent(new Event('input'));ta.value=names.join('\n');window.scrollTo(0,0);};
    const rn=el('button','btn ghost','Rename');rn.style.cssText='font-size:13px;padding:7px 14px';
    rn.onclick=async()=>{
      const nn=prompt('Rename class \''+c+'\' to:\n(e.g. move 12a/Bs1 up to 13a/Bs1 at start of year)',c);
      if(nn===null)return;const newC=nn.trim();
      if(!newC||newC===c)return;
      if(!specOf(newC)){toast('New code must contain Bs or Ec');return;}
      if(specOf(newC)!==specOf(c)&&!confirm('Warning: this changes the SUBJECT from '+specOf(c)+' to '+specOf(newC)+'. Existing scores will move with it. Continue?'))return;
      const clash=await Store.get('roster:'+ck(newC));
      if(clash&&!confirm('A class \''+newC+'\' already exists. Merging may overwrite its register. Continue?'))return;
      try{await migrateClass(c,newC);toast('Renamed '+c+' -> '+newC);render();}
      catch(err){toast('Rename failed: '+(err&&err.message||err));}
    };
    const dl=el('button','btn ghost','Delete');dl.style.cssText='font-size:13px;padding:7px 14px;color:var(--rose);border-color:var(--rose)';
    dl.onclick=async()=>{
      if(!confirm('Delete class \''+c+'\'?\nThis permanently removes its register, assigned tasks, and ALL student scores for this class. This cannot be undone.'))return;
      try{await deleteClass(c);toast('Deleted '+c);render();}
      catch(err){toast('Delete failed: '+(err&&err.message||err));}
    };
    const actions=row.children[1];actions.style.cssText='display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end';
    actions.appendChild(ed);actions.appendChild(rn);actions.appendChild(dl);lc.appendChild(row);}
  app.appendChild(lc);
}

function card_empty(msg){const c=el('div','card');c.appendChild(el('div','empty',msg));return c;}
function classPicker(classes,cur,cb){const p=el('div','card');p.innerHTML=`<div class="eyebrow">Class</div>`;
  const ps=el('select','field mono');ps.style.marginTop='8px';
  ps.innerHTML=classes.map(c=>`<option ${c===cur?'selected':''}>${c}</option>`).join('');
  ps.onchange=()=>cb(ps.value);p.appendChild(ps);return p;}
function topicRow(t){const band=t.pct>=80?'good':t.pct>=50?'mid':'weak';
  const col=t.pct>=80?'var(--good)':t.pct>=50?'var(--mid)':'var(--weak)';
  const r=el('div');r.style.marginBottom='12px';
  r.innerHTML=`<div class="flex" style="margin-bottom:5px"><span style="font-size:14px">${esc(t.topic)}</span>
      <span class="muted mono" style="font-size:11px">${t.code}</span><div class="spacer"></div>
      <span class="pill ${band}">${t.pct}%</span></div>
    <div class="bar"><i style="width:${t.pct}%;background:${col}"></i></div>`;return r;}
function topicTrends(att){
  // group attempts per topic, sorted by time; compute trend from first-half vs second-half avg %
  const m={};
  att.forEach(a=>{(m[a.code]=m[a.code]||{code:a.code,topic:a.topic,paper:a.paper,runs:[]}).runs.push(a);});
  return Object.values(m).map(t=>{
    const runs=t.runs.slice().sort((x,y)=>x.ts-y.ts);
    const pcts=runs.map(r=>r.total?r.score/r.total*100:0);
    const best=Math.round(Math.max(...pcts));
    const latest=Math.round(pcts[pcts.length-1]);
    const avg=Math.round(pcts.reduce((s,v)=>s+v,0)/pcts.length);
    let trend='new';
    if(runs.length>=2){
      const half=Math.floor(pcts.length/2)||1;
      const early=pcts.slice(0,half),late=pcts.slice(-half);
      const ea=early.reduce((s,v)=>s+v,0)/early.length;
      const la=late.reduce((s,v)=>s+v,0)/late.length;
      const d=la-ea;
      trend=d>=8?'up':d<=-8?'down':'steady';
    }
    return {code:t.code,topic:t.topic,paper:t.paper,attempts:runs.length,best,latest,avg,trend,lastTs:runs[runs.length-1].ts};
  });
}
function topicStats(att){const m={};
  att.forEach(a=>{const t=m[a.code]||(m[a.code]={code:a.code,topic:a.topic,got:0,tot:0,attempts:0});
    t.got+=a.score;t.tot+=a.total;t.attempts++;});
  return Object.values(m).map(t=>({...t,pct:t.tot?Math.round(t.got/t.tot*100):0}));}
async function allAttempts(){const keys=await Store.list('attempt:');const out=[];
  for(const k of keys){const v=await Store.get(k);if(v)out.push(v);}return out;}
async function attemptsFor(cls,name){const keys=await Store.list('attempt:'+ck(cls)+':'+slug(name)+':');const out=[];
  for(const k of keys){const v=await Store.get(k);if(v)out.push(v);}return out;}

async function render(){const app=shell();
  if(MODE==='student'){if(!SESSION)studentLogin(app);else await studentHome(app);}
  else await teacherView(app);}
render();
